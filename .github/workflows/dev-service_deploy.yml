name: dev-service_deploy.yml
on:
  push:
    tags:
      - 'dev-*'
  workflow_dispatch:
jobs:
  deploy:
    name: Build docker image and deploy to Azure Container App
    runs-on: ubuntu-latest
    environment: development
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
      - name: Azure CLI login
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      - name: Setup JDK 25 for building the app
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'maven'
      - name: Build the app with Maven
        run: mvn -B package --file pom.xml -DskipTests
      - name: Login to Azure Container Registry
        run: az acr login --name ${{ vars.ACR_NAME }}
      - name: Build and push Docker image to ACR
        run: |
          docker build -t ${{ vars.ACR_NAME }}.azurecr.io/dps:${{ github.sha }} .
          docker push ${{ vars.ACR_NAME }}.azurecr.io/dps:${{ github.sha }}
      - name: Update Azure Container App with new image
        run: |
          az containerapp update \
            --name ${{ vars.CONTAINER_APP_NAME }} \
            --resource-group ${{ vars.RESOURCE_GROUP }} \
            --image ${{ vars.ACR_NAME }}.azurecr.io/dps:${{ github.sha }}
